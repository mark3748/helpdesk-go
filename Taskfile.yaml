version: "3"

# Global variables (optional, but good for versioning)
vars:
  BINARY_DIR: "bin"
  VERSION: '{{default "dev" .VERSION}}'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:
    desc: Build API and worker binaries
    cmds:
      - echo "Building API binary..."
      - go mod tidy
      - go build -ldflags="-X github.com/mark3748/helpdesk-go/internal/buildinfo.Version={{.VERSION}}" -o {{.BINARY_DIR}}/api{{exeExt}} ./cmd/api
      - echo "Building worker binary..."
      - go build -o {{.BINARY_DIR}}/worker{{exeExt}} ./cmd/worker
      - echo "Build complete!"

  test:
    desc: Run tests with coverage
    env:
      TEST_BYPASS_AUTH: true
    cmds:
      - echo "Running tests with coverage..."
      - go test -cover ./...
      - echo "Tidying modules..."
      - go mod tidy
      - echo "Checking for clean git state..."
      - git diff --exit-code go.mod go.sum

  clean:
    desc: Clean build artifacts
    cmds:
      # Cross-platform deletion
      - cmd: '{{if eq OS "windows"}}powershell -c "Remove-Item -Recurse -Force {{.BINARY_DIR}}, helpdesk-*.tgz, rendered.yaml -ErrorAction SilentlyContinue"{{else}}rm -rf {{.BINARY_DIR}} helpdesk-*.tgz rendered.yaml{{end}}'
    ignore_error: true

  docker:
    desc: Build Docker images
    cmds:
      - echo "Building Docker images..."
      - docker build --build-arg APP_VERSION={{.VERSION}} -f Dockerfile.api -t helpdesk-api .
      - docker build -f Dockerfile.worker -t helpdesk-worker .
      - docker build -f Dockerfile.frontend-internal -t helpdesk-internal-frontend .
      - docker build -f Dockerfile.frontend-requester -t helpdesk-requester-frontend .
      - echo "Docker images built successfully!"

  lint-helm:
    desc: Lint and package Helm chart
    cmds:
      - echo "Linting Helm chart..."
      - helm lint helm/helpdesk
      - echo "Verifying ingress API mapping..."
      - helm template test helm/helpdesk > rendered.yaml
      # Cross-platform ingress API mapping check:
      # - On Unix-like systems, use grep.
      # - On Windows, use PowerShell Select-String.
      - cmd: '{{if eq OS "windows"}}powershell -Command "Select-String -Path rendered.yaml -Pattern ''path: /api'' -Context 0,5 | Select-String -Pattern ''name: test-helpdesk-api''"{{else}}grep -A 5 ''path: /api'' rendered.yaml | grep ''name: test-helpdesk-api''{{end}}'
      - echo "Packaging Helm chart..."
      - helm package helm/helpdesk

  dev-up:
    desc: Start development stack
    cmds:
      - echo "Starting development stack..."
      - docker compose up -d db redis api worker
      - 'echo "API available at: http://localhost:8080"'
      - 'echo "Health check: curl http://localhost:8080/healthz"'

  tilt:
    desc: Start Tilt for Kubernetes development
    cmds:
      - tilt up

  dev-down:
    desc: Stop development stack
    cmds:
      - docker compose down

  frontend:
    desc: Install and build frontend applications
    cmds:
      - task: frontend-internal
      - task: frontend-requester

  frontend-internal:
    internal: true
    dir: web/internal
    cmds:
      - echo "Setting up internal UI..."
      - npm install
      - npm run build

  frontend-requester:
    internal: true
    dir: web/requester
    cmds:
      - echo "Setting up requester UI..."
      - npm install
      - npm run build

  gen-types:
    desc: Generate TypeScript types from OpenAPI spec
    cmds:
      - echo "Copying OpenAPI spec..."
      - cmd: '{{if eq OS "windows"}}copy docs\openapi.yaml web\internal\{{else}}cp docs/openapi.yaml web/internal/{{end}}'
      - cmd: '{{if eq OS "windows"}}copy docs\openapi.yaml web\requester\{{else}}cp docs/openapi.yaml web/requester/{{end}}'
      - echo "Generating types..."
      - task: gen-types-internal
      - task: gen-types-requester
      - echo "Cleaning up..."
      - cmd: '{{if eq OS "windows"}}del web\internal\openapi.yaml web\requester\openapi.yaml{{else}}rm web/internal/openapi.yaml web/requester/openapi.yaml{{end}}'

  gen-types-internal:
    internal: true
    dir: web/internal
    cmds:
      - npm run gen:api:file

  gen-types-requester:
    internal: true
    dir: web/requester
    cmds:
      - npm run gen:api:file

  dev-full:
    desc: Start full development stack with frontends
    cmds:
      - echo "Starting full stack..."
      - docker compose up -d db redis api worker internal requester
      - 'echo "API: http://localhost:8080"'
      - 'echo "Internal UI: http://localhost:5175"'
      - 'echo "Requester UI: http://localhost:5174"'
